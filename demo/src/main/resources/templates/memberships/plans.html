<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Membership Plans')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('plans')}"></div>

<div class="main-content" th:classappend="${#authorization.expression('hasRole(''ADMIN'')')} ? '' : 'no-sidebar'">
    <div class="topbar">
        <div class="topbar-title">📋 Membership Plans</div>
        <div class="topbar-actions">
            <button onclick="document.getElementById('createForm').scrollIntoView({behavior:'smooth'})"
                    class="btn btn-primary">➕ New Plan</button>
        </div>
    </div>

    <div class="page-body">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Existing Plans -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">All Plans</div>
                <span class="badge badge-info" th:text="${#lists.size(plans)} + ' plans'"></span>
            </div>
            <div class="card-body" style="padding:0;">
                <div th:if="${#lists.isEmpty(plans)}" class="empty-state">
                    <div class="empty-icon">📋</div>
                    <h3>No Plans Created</h3>
                    <p>Create your first membership plan below.</p>
                </div>
                <div class="table-wrapper" th:unless="${#lists.isEmpty(plans)}">
                    <table>
                        <thead>
                            <tr>
                                <th>Plan Name</th>
                                <th>Duration</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${plans}">
                                <td style="font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;"
                                    th:text="${p.name}"></td>
                                <td>
                                    <span class="badge badge-info" th:text="${p.duration}"></span>
                                </td>
                                <td style="font-weight:700;color:var(--accent);font-size:1.05rem;"
                                    th:text="'$' + ${p.price}"></td>
                                <td>
                                    <span th:class="'badge badge-' + ${#strings.toLowerCase(p.status.name())}"
                                          th:text="${p.status}"></span>
                                </td>
                                <td style="color:var(--text-secondary);font-size:.85rem;max-width:200px;"
                                    th:text="${p.description ?: '—'}"></td>
                                <td>
                                    <div style="display:flex;gap:6px;">
                                        <a th:href="@{/memberships/plans/edit/{id}(id=${p.id})}"
                                           class="btn btn-secondary btn-sm">✏️ Edit</a>
                                        <form th:action="@{/memberships/plans/delete/{id}(id=${p.id})}" method="post"
                                              onsubmit="return confirm('Delete this plan?')">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <button type="submit" class="btn btn-danger btn-sm">🗑</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Create Plan Form -->
        <div class="card" id="createForm">
            <div class="card-header">
                <div class="card-title">➕ Create New Plan</div>
            </div>
            <div class="card-body">
                <form th:action="@{/memberships/plans/create}" th:object="${planDto}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-grid">

                        <div class="form-group">
                            <label>Plan Name <span class="required-mark">*</span></label>
                            <input type="text" th:field="*{name}" placeholder="e.g. Monthly Basic"/>
                            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="form-group">
                            <label>Duration <span class="required-mark">*</span></label>
                            <select th:field="*{duration}">
                                <option value="">— Select Duration —</option>
                                <option th:each="d : ${durations}" th:value="${d}" th:text="${d}"></option>
                            </select>
                            <div class="field-error" th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}"></div>
                        </div>

                        <div class="form-group">
                            <label>Price (USD) <span class="required-mark">*</span></label>
                            <input type="number" step="0.01" min="0" th:field="*{price}" placeholder="0.00"/>
                            <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="form-group">
                            <label>Status <span class="required-mark">*</span></label>
                            <select th:field="*{status}">
                                <option value="">— Select Status —</option>
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                            <div class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                        </div>

                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea th:field="*{description}" rows="2"
                                      placeholder="Brief description of the plan..."></textarea>
                        </div>

                    </div>

                    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:12px;">
                        <button type="submit" class="btn btn-primary">➕ Create Plan</button>
                        <a th:href="@{/memberships/plans}" class="btn btn-secondary">Reset</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
