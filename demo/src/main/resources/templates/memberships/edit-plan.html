<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Plan')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('plans')}"></div>

<div class="main-content">
    <div class="topbar">
        <div class="topbar-title">✏️ Edit Membership Plan</div>
        <div class="topbar-actions">
            <a th:href="@{/memberships/plans}" class="btn btn-secondary">← Back to Plans</a>
        </div>
    </div>

    <div class="page-body">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card" style="max-width:700px;">
            <div class="card-header">
                <div class="card-title">✏️ Edit Plan Details</div>
            </div>
            <div class="card-body">
                <form th:action="@{/memberships/plans/update}" th:object="${planDto}" method="post">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Plan Name <span class="required-mark">*</span></label>
                            <input type="text" th:field="*{name}"/>
                            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="form-group">
                            <label>Duration <span class="required-mark">*</span></label>
                            <select th:field="*{duration}">
                                <option th:each="d : ${durations}" th:value="${d}" th:text="${d}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Price (USD) <span class="required-mark">*</span></label>
                            <input type="number" step="0.01" min="0" th:field="*{price}"/>
                            <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="form-group">
                            <label>Status <span class="required-mark">*</span></label>
                            <select th:field="*{status}">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>

                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea th:field="*{description}" rows="3"></textarea>
                        </div>
                    </div>

                    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:12px;">
                        <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                        <a th:href="@{/memberships/plans}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
