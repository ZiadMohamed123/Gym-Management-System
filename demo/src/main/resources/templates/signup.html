<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Create Member Account — GymPro</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
	<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
	<style>
		:root {
			--orange: #ff4d00;
			--orange-dim: #cc3d00;
			--dark: #0d0d0d;
			--dark2: #161616;
			--dark3: #1f1f1f;
			--text: #f0f0f0;
			--muted: #888;
			--border: rgba(255, 255, 255, 0.08);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Barlow", sans-serif;
			background: radial-gradient(circle at 20% 20%, rgba(255, 77, 0, 0.15), transparent 50%),
				linear-gradient(180deg, var(--dark) 0%, var(--dark2) 100%);
			color: var(--text);
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 40px 16px;
		}

		.signup-card {
			width: min(640px, 100%);
			background: rgba(22, 22, 22, 0.95);
			border: 1px solid var(--border);
			border-radius: 18px;
			padding: 32px;
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
		}

		.brand {
			font-family: "Barlow Condensed", sans-serif;
			font-size: 2rem;
			font-weight: 900;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			margin-bottom: 6px;
		}

		.brand span {
			color: var(--orange);
		}

		.subtitle {
			color: rgba(240, 240, 240, 0.6);
			margin-bottom: 26px;
			font-size: 0.95rem;
		}

		.form-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 14px;
		}

		.form-group {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.form-group.full-width {
			grid-column: 1 / -1;
		}

		label {
			font-size: 0.85rem;
			color: rgba(240, 240, 240, 0.75);
		}

		input,
		textarea {
			background: var(--dark3);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 12px 14px;
			color: var(--text);
			font-size: 0.95rem;
			outline: none;
		}

		input:focus,
		textarea:focus {
			border-color: var(--orange);
			box-shadow: 0 0 0 3px rgba(255, 77, 0, 0.15);
		}

		.field-error {
			font-size: 0.8rem;
			color: #ff9b7a;
		}

		.btn-primary {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
			width: 100%;
			padding: 12px 16px;
			background: var(--orange);
			border: none;
			border-radius: 10px;
			color: #fff;
			font-weight: 700;
			cursor: pointer;
			transition: all 0.2s;
		}

		.btn-primary:hover {
			background: var(--orange-dim);
			transform: translateY(-1px);
		}

		.alert {
			margin-bottom: 16px;
			padding: 10px 12px;
			border-radius: 10px;
			background: rgba(255, 77, 0, 0.1);
			border: 1px solid rgba(255, 77, 0, 0.3);
			font-size: 0.85rem;
		}

		.actions {
			display: flex;
			gap: 12px;
			margin-top: 18px;
		}

		.actions a {
			color: rgba(240, 240, 240, 0.65);
			text-decoration: none;
			font-size: 0.9rem;
		}

		@media (max-width: 720px) {
			.form-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="signup-card">
		<div class="brand">Join Gym<span>Pro</span></div>
		<div class="subtitle">Create your member account.</div>

		<div th:if="${errorMessage}" class="alert" th:text="${errorMessage}"></div>

		<form th:action="@{/signup}" th:object="${signupDto}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
			<div class="form-grid">
				<div class="form-group">
					<label>Full Name</label>
					<input type="text" th:field="*{fullName}" />
					<div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
				</div>
				<div class="form-group">
					<label>Email</label>
					<input type="email" th:field="*{email}" />
					<div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
				</div>
				<div class="form-group">
					<label>Phone Number</label>
					<input type="text" th:field="*{phoneNumber}" />
					<div class="field-error" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
				</div>
				<div class="form-group">
					<label>Date of Birth</label>
					<input type="date" th:field="*{dateOfBirth}" />
					<div class="field-error" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></div>
				</div>
				<div class="form-group full-width">
					<label>Address</label>
					<textarea rows="2" th:field="*{address}"></textarea>
					<div class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
				</div>
				<div class="form-group">
					<label>Password</label>
					<input type="password" th:field="*{password}" />
					<div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
				</div>
				<div class="form-group">
					<label>Confirm Password</label>
					<input type="password" th:field="*{confirmPassword}" />
					<div class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
				</div>
			</div>

			<button type="submit" class="btn-primary" style="margin-top: 24px;">Create Account</button>
		</form>

		<div class="actions">
			<a th:href="@{/login}">Already have an account? Sign in</a>
		</div>
	</div>
</body>
</html>
