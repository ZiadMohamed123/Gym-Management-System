<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Create Class')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('create-class')}"></div>

<div class="main-content" th:classappend="${#authorization.expression('hasRole(''ADMIN'')')} ? '' : 'no-sidebar'">
    <div class="topbar">
        <div class="topbar-title">📅 Create New Class</div>
        <div class="topbar-actions">
            <a th:href="@{/classes}" class="btn btn-secondary">← All Classes</a>
        </div>
    </div>

    <div class="page-body">
        <div class="breadcrumb">
            <a th:href="@{/}">Dashboard</a>
            <span class="sep">›</span>
            <a th:href="@{/classes}">Classes</a>
            <span class="sep">›</span>
            <span>Create</span>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card" style="max-width:800px;">
            <div class="card-header">
                <div class="card-title">📅 Class Details</div>
            </div>
            <div class="card-body">
                <form th:action="@{/classes/create}" th:object="${classDto}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-grid">

                        <div class="form-group">
                            <label>Class Name <span class="required-mark">*</span></label>
                            <input type="text" th:field="*{name}" placeholder="e.g. Morning Yoga"/>
                            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="form-group" sec:authorize="hasRole('ADMIN')">
                            <label>Created By <span class="required-mark">*</span></label>
                            <input type="text" th:field="*{createdBy}" placeholder="Trainer or Admin name"/>
                            <div class="field-error" th:if="${#fields.hasErrors('createdBy')}" th:errors="*{createdBy}"></div>
                        </div>

                        <div class="form-group">
                            <label>Schedule (Date & Time) <span class="required-mark">*</span></label>
                            <input type="datetime-local" th:field="*{scheduleDateTime}"/>
                            <div class="field-error" th:if="${#fields.hasErrors('scheduleDateTime')}" th:errors="*{scheduleDateTime}"></div>
                        </div>

                        <div class="form-group">
                            <label>Max Capacity <span class="required-mark">*</span></label>
                            <input type="number" th:field="*{maxCapacity}" min="1" max="500" placeholder="e.g. 20"/>
                            <div class="field-error" th:if="${#fields.hasErrors('maxCapacity')}" th:errors="*{maxCapacity}"></div>
                        </div>

                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea th:field="*{description}" rows="3"
                                      placeholder="Brief description of the class..."></textarea>
                        </div>

                    </div>

                    <div style="margin-top:28px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:12px;">
                        <button type="submit" class="btn btn-primary btn-lg">📅 Create Class</button>
                        <a th:href="@{/classes}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
