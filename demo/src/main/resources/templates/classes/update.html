<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Update Class')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('classes')}"></div>

<div class="main-content" th:classappend="${#authorization.expression('hasRole(''ADMIN'')')} ? '' : 'no-sidebar'">
    <div class="topbar">
        <div class="topbar-title">✏️ Update Class</div>
        <div class="topbar-actions">
            <a th:href="@{/classes}" class="btn btn-secondary">← All Classes</a>
        </div>
    </div>

    <div class="page-body">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card" style="max-width:800px;">
            <div class="card-header">
                <div class="card-title">✏️ Edit Class Details</div>
            </div>
            <div class="card-body">
                <form th:action="@{/classes/update}" th:object="${classDto}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" th:field="*{id}"/>

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Class Name <span class="required-mark">*</span></label>
                            <input type="text" th:field="*{name}"/>
                            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="form-group" sec:authorize="hasRole('ADMIN')">
                            <label>Assigned Trainer <span class="required-mark">*</span></label>
                            <select th:field="*{createdBy}">
                                <option value="" disabled>Select a Trainer</option>
                                <option th:each="t : ${trainers}" th:value="${t.username}" th:text="${t.username}"></option>
                            </select>
                            <div class="field-error" th:if="${#fields.hasErrors('createdBy')}" th:errors="*{createdBy}"></div>
                        </div>

                        <div class="form-group">
                            <label>Schedule (Date & Time) <span class="required-mark">*</span></label>
                            <input type="datetime-local" th:field="*{scheduleDateTime}"/>
                            <div class="field-error" th:if="${#fields.hasErrors('scheduleDateTime')}" th:errors="*{scheduleDateTime}"></div>
                        </div>

                        <div class="form-group">
                            <label>Max Capacity <span class="required-mark">*</span></label>
                            <input type="number" th:field="*{maxCapacity}" min="1" max="500"/>
                            <div class="field-error" th:if="${#fields.hasErrors('maxCapacity')}" th:errors="*{maxCapacity}"></div>
                        </div>

                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea th:field="*{description}" rows="3"></textarea>
                        </div>

                    </div>

                    <div style="margin-top:28px;padding-top:20px;border-top:1px solid var(--border);display:flex;gap:12px;">
                        <button type="submit" class="btn btn-primary btn-lg">💾 Save Changes</button>
                        <a th:href="@{/classes}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
