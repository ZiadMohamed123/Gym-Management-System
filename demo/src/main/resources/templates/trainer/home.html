<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Trainer Home')}"></head>
<body>

<div class="main-content no-sidebar">
	<div class="topbar">
		<div class="topbar-title">🏋️ Trainer Home</div>
		<div class="topbar-actions">
			<form th:action="@{/logout}" method="post" style="margin:0;">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<button type="submit" class="btn btn-secondary">Sign out</button>
			</form>
		</div>
	</div>

	<div class="page-body">
		<div class="page-header">
			<div>
				<h2 th:text="'Welcome, ' + ${trainerName}"></h2>
				<p>Manage your classes and view member status.</p>
			</div>
		</div>

		<div class="card">
			<div class="card-header">
				<div class="card-title">Quick Actions</div>
			</div>
			<div class="card-body" style="display:flex;gap:12px;flex-wrap:wrap;">
				<a th:href="@{/classes}" class="btn btn-secondary">🏃 My Classes</a>
				<a th:href="@{/classes/create}" class="btn btn-primary">📅 Create Class</a>
				<a th:href="@{/members/status}" class="btn btn-secondary">🔖 Member Status</a>
			</div>
		</div>

		<div class="card">
			<div class="card-header">
				<div class="card-title">My Classes</div>
			</div>
			<div class="card-body" style="padding:0;">
				<div th:if="${#lists.isEmpty(myClasses)}" class="empty-state">
					<div class="empty-icon">📅</div>
					<h3>No Classes Yet</h3>
					<p style="margin-top:8px;">Create your first class to get started.</p>
				</div>
				<div class="table-wrapper" th:unless="${#lists.isEmpty(myClasses)}">
					<table>
						<thead>
							<tr>
								<th>Class</th>
								<th>Schedule</th>
								<th>Capacity</th>
								<th></th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="c : ${myClasses}">
								<td th:text="${c.name}"></td>
								<td th:text="${#temporals.format(c.scheduleDateTime,'MMM d, yyyy HH:mm')}"></td>
								<td th:text="${c.bookedCount} + ' / ' + ${c.maxCapacity}"></td>
								<td>
									<a th:href="@{/classes/participants/{id}(id=${c.id})}" class="btn btn-secondary btn-sm">👥 Participants</a>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>

</body>
</html>
